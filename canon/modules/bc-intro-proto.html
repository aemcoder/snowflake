              text (one phrase) — the cascade will not split per word; the
              `.reveal` class on the h2 still triggers the section-level
              fade-in. This trade-off is documented; an automated word-split
              pass at decoration time is a future enhancement.
              Decision: separate module-id (`bc-intro-proto`) — the simpler
              `bc-intro` canon stays for the live BC product page, prototypes
              opt-in to this variant.

<section class="bc-intro">
  <h2 class="bc-intro__title reveal" data-slot="title">
    <span class="word-cascade">
      <span>Guide</span> <span>customer</span> <span>journeys</span> <span>with</span> <span>personalized,</span>
      <span>conversational</span> <span>discovery.</span>
    </span>
  </h2>
</section>
