<section class="faq-accordion">
  <div class="faq-accordion__inner">
    <h2 class="faq-accordion__title" data-slot="title">Questions? We have answers.</h2>

    <ul class="faq-accordion__list" data-slot-list="items">

        </button>
        <div class="faq-accordion__panel">
          <p class="faq-accordion__answer" data-slot="answer">Adobe LLM Optimizer is a generative AI search and discovery optimization solution that helps brands improve how their content is cited and surfaced in AI-powered search results. It provides automated insights, recommendations, and optimizations across major LLMs.</p>
        </div>
      </li>
    </ul>
  </div>
</section>
